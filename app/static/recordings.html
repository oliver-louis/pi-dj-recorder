<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recordings - Pi Xone:96 Recorder</title>
    <script>
      document.documentElement.dataset.theme = localStorage.getItem("theme-cache") || "dark";
    </script>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/app.js" defer></script>
  </head>
  <body data-page="recordings">
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Saved WAV files</p>
          <h1>Recordings</h1>
        </div>
        <div class="topbar-controls">
          <a class="icon-button" href="/settings" aria-label="Settings" title="Settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10.2 2.6h3.6l.5 2.3c.5.2 1 .4 1.4.8l2.2-.7 1.8 3.1-1.7 1.5c.1.3.1.7.1 1.1s0 .8-.1 1.1l1.7 1.5-1.8 3.1-2.2-.7c-.4.3-.9.6-1.4.8l-.5 2.3h-3.6l-.5-2.3c-.5-.2-1-.4-1.4-.8l-2.2.7-1.8-3.1 1.7-1.5C6 12.8 6 12.4 6 12s0-.8.1-1.1L4.4 9.4l1.8-3.1 2.2.7c.4-.3.9-.6 1.4-.8zm1.8 6.4a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" />
            </svg>
          </a>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch theme">Light</button>
        </div>
      </header>
      <nav class="tabs" aria-label="Primary">
        <a href="/">Record</a>
        <a class="active" href="/recordings">Recordings</a>
      </nav>

      <section class="panel">
        <div id="recordings-list" class="recordings-list"></div>
        <p id="message" class="message" role="status"></p>
      </section>
    </main>
  </body>
</html>
